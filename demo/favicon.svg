<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium color gradients matching Dr. Roof brand -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#054571" />
      <stop offset="100%" stop-color="#075a92" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8cc43f" />
      <stop offset="100%" stop-color="#76ab32" />
    </linearGradient>
    <!-- Soft premium shadow drop -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#075a92" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background base rounded-card shape -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="#ffffff" filter="url(#dropShadow)" />
  <rect x="32" y="32" width="448" height="448" rx="112" fill="#ffffff" stroke="#e2e8f0" stroke-width="8" />

  <!-- Shield overlay context -->
  <path d="M256,96 C190,96 144,120 120,180 C120,300 210,390 256,416 C302,390 392,300 392,180 C368,120 322,96 256,96 Z" 
        fill="url(#blueGrad)" opacity="0.08" />

  <!-- Clean, geometric double roof architectural lines -->
  <!-- Back/Left Larger Roof Gable -->
  <path d="M110,280 L230,160 L350,280 L320,280 L230,190 L140,280 Z" fill="url(#blueGrad)" />

  <!-- Front/Right Smaller Roof Gable overlapping -->
  <path d="M200,320 L290,230 L380,320 L350,320 L290,260 L230,320 Z" fill="url(#greenGrad)" />

  <!-- Structural chimney / weather defense element -->
  <rect x="305" y="190" width="30" height="50" fill="url(#blueGrad)" />

  <!-- Badge cross / "Dr." medical cross concept in accent green for subtle brand play -->
  <g transform="translate(256, 360) scale(0.8)">
    <circle cx="0" cy="0" r="32" fill="url(#greenGrad)" />
    <!-- White medical-style plus sign -->
    <rect x="-6" y="-18" width="12" height="36" rx="3" fill="#ffffff" />
    <rect x="-18" y="-6" width="36" height="12" rx="3" fill="#ffffff" />
  </g>
</svg>
